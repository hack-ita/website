{{ define "main" }}
  <section class="bg-mask min-h-[70vh] flex items-center pt-30 pb-20 px-5">
    <div class="max-w-5xl mx-auto flex flex-col items-center gap-8 text-center">
      <h1 class="text-primary">{{ .Title }}</h1>

      {{ with .Description }}
      <p class="text-dark dark:text-light text-pretty text-lg">{{ . }}</p>
      {{ end }}

      <img
        src='{{ "images/dev/thank_you.jpeg" | relURL }}'
        alt="{{ .Title | plainify }}"
        loading="eager"
        decoding="async"
        class="w-full h-auto rounded-md"
      />

      <div>
        {{ partial "components/button.html" (dict
            "link" "true"
            "label" "Torna alla home"
            "url" (site.Home.RelPermalink)
        ) }}
      </div>
    </div>
  </section>
{{ end }}
